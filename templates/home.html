<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;700&display=swap">
    <style>
        body {
            background-color: #343a40;
            color: #f8f9fa;
            font-family: 'Ubuntu', sans-serif;
        }
        .container {
            margin-top: 50px;
            background-color: #212529;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 1px 2px 71px -6px rgba(0, 0, 0, 0.67);
            max-width: 800px;
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
        }
        .course-form {
            margin-top: 50px; /* Increase the gap between view and add courses */
        }
        input {
            width: 100%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            background-color: #6c757d;
            color: #f8f9fa;
        }
        input:focus {
            outline: none;
            border: 5px solid #06d6a0;
            box-shadow: 0 0 10px rgba(6, 214, 160, 0.5);
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #248277;
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover {
            background-color: #036666;
        }
        .course-list {
            margin-top: 20px;
        }
        .course-item {
            background-color: #6c757d;
            margin-bottom: 10px;
            padding: 10px;
            border-radius: 5px;
            display: block; /* Make course items block level for full-width click */
            text-decoration: none; /* Remove underline */
            color: #f8f9fa; /* Course item text color */
        }
        .course-item:hover {
            background-color: #5a6268; /* Change background on hover */
        }
        .navbar {
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <span class="navbar-brand">Attendance Management System</span>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                </ul>
                <span class="navbar-text">
                    Welcome, {{ user.name }} | <a href="{% url 'logout' %}" class="text-danger">Logout</a>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h2>Your Courses</h2>
        <div class="course-list">
            {% for course in courses %}
                <a href="{% url 'register' course.id %}" class="course-item">{{ course.name }}</a>
            {% empty %}
                <div class="course-item">No courses added yet.</div>
            {% endfor %}
        </div>

        <h1>Add Your Courses</h1>
        <form method="POST" action="{% url 'home' %}" class="course-form">
            {% csrf_token %}
            <input type="text" name="course_name" placeholder="Course Name" required>
            <button type="submit">Add Course</button>
        </form>
    </div>
</body>
</html>
